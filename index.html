<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Currency Converter</title>

  <style>
   body {
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.app {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input, select {
  padding: 10px;
  margin: 8px;
  width: 80%;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 85%;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #00c6ff;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
  </style>
</head>

<body>

<div class="app">
  <h2>Конвертер валют</h2>

  <input id="amount" placeholder="Сумма" type="number">

  <br>

<select id="from">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="RUB">RUB</option>
  <option value="GBP">GBP</option>
  <option value="JPY">JPY</option>
  <option value="CNY">CNY</option>
</select>

<select id="to">
  <option value="RUB">RUB</option>
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="JPY">JPY</option>
  <option value="CNY">CNY</option>
</select>

  <br>

  <button onclick="convert()">Конвертировать</button>
  <button onclick="swap()">↔️ Поменять</button>

  <div class="result" id="result"></div>
</div>

<script>
async function convert() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) return;

  let url = `https://api.exchangerate-api.com/v4/latest/${from}`;

  let response = await fetch(url);
  let data = await response.json();

  let rate = data.rates[to];
  let result = amount * rate;

  document.getElementById("result").innerText =
    `${amount} ${from} = ${result.toFixed(2)} ${to}`;
}

function swap() {
  let from = document.getElementById("from");
  let to = document.getElementById("to");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;
}

setInterval(convert, 10000);
</script>

</body>
</html>
